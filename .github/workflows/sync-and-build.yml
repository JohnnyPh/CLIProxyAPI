name: Sync Upstream and Build Docker
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
concurrency:
  group: sync-and-build-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  actions: write
jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false
    outputs:
      build_required: ${{ steps.decision.outputs.build_required }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.UPSTREAM_SYNC_TOKEN || github.token }}

      - name: Configure Git
        run: |
          git config --global user.name 'JohnnyPh'
          git config --global user.email '28253406+JohnnyPh@users.noreply.github.com'

      - name: Sync with Upstream
        id: sync
        env:
          UPSTREAM_SYNC_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN }}
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git || git remote set-url upstream https://github.com/router-for-me/CLIProxyAPI.git
          git fetch upstream --tags
          CURRENT_BRANCH=$(git branch --show-current)
          echo "Current branch: $CURRENT_BRANCH"

          if [ "$(git rev-parse HEAD)" = "$(git rev-parse upstream/main)" ]; then
            echo "Already up to date."
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Upstream is behind current branch. Nothing to sync."
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Updates detected. Merging upstream..."
          git merge --no-ff --no-commit upstream/main

          # GitHub Actions' default token cannot update workflow files; avoid failing the sync.
          if [ -z "${UPSTREAM_SYNC_TOKEN:-}" ] && ! git diff --cached --quiet -- .github/workflows; then
            echo "Skipping .github/workflows changes (no UPSTREAM_SYNC_TOKEN provided)."
            git restore --source=HEAD --staged --worktree .github/workflows
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            git merge --abort 2>/dev/null || true
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "Merge upstream/main"
          git push origin "$CURRENT_BRANCH"
          echo "changes_detected=true" >> $GITHUB_OUTPUT

      - name: Decide whether to build
        id: decision
        run: |
          if [ "${{ steps.sync.outputs.changes_detected }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build_required=true" >> $GITHUB_OUTPUT
          else
            echo "build_required=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip build when nothing changed
        if: ${{ steps.decision.outputs.build_required != 'true' }}
        run: echo "No upstream changes detected; skipping Docker build."

      - name: Set up Docker Buildx
        if: ${{ steps.decision.outputs.build_required == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: ${{ steps.decision.outputs.build_required == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare build args
        id: prep
        if: ${{ steps.decision.outputs.build_required == 'true' }}
        run: |
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "date=$BUILD_DATE" >> $GITHUB_OUTPUT
          GIT_SHA=$(git rev-parse HEAD)
          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT
          VERSION=$(git describe --tags --always --dirty || git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push
        if: ${{ steps.decision.outputs.build_required == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=cli-proxy-api
          cache-to: type=gha,mode=min,scope=cli-proxy-api,ignore-error=true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cli-proxy-api:latest
            ${{ secrets.DOCKER_USERNAME }}/cli-proxy-api:${{ steps.prep.outputs.git_sha }}
            ${{ secrets.DOCKER_USERNAME }}/cli-proxy-api:${{ steps.prep.outputs.version }}
          build-args: |
            VERSION=${{ steps.prep.outputs.version }}
            COMMIT=${{ steps.prep.outputs.git_sha }}
            GIT_COMMIT=${{ steps.prep.outputs.git_sha }}
            DATE=${{ steps.prep.outputs.date }}
            BUILD_DATE=${{ steps.prep.outputs.date }}
            builtAt=${{ steps.prep.outputs.date }}

  update-unraid:
    name: Update Unraid container
    needs: sync-and-build
    runs-on: ubuntu-latest
    if: ${{ needs.sync-and-build.outputs.build_required == 'true' }}
    steps:
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Trigger Unraid Docker update
        env:
          UNRAID_BASE_URL: https://unraid.3aa.uk
          UNRAID_USERNAME: ${{ secrets.UNRAID_USERNAME }}
          UNRAID_PASSWORD: ${{ secrets.UNRAID_PASSWORD }}
          UNRAID_CONTAINERS: CLIProxyAPI
        run: |
          node --input-type=module <<'NODE'
          const baseUrl = new URL(process.env.UNRAID_BASE_URL || "https://unraid.3aa.uk");
          const username = process.env.UNRAID_USERNAME;
          const password = process.env.UNRAID_PASSWORD;
          const containers = (process.env.UNRAID_CONTAINERS || "CLIProxyAPI")
            .split(",")
            .map((value) => value.trim())
            .filter(Boolean);

          if (!username || !password || !containers.length) process.exit(1);

          const cookieJar = new Map();
          const cookieHeader = () => [...cookieJar].map(([key, value]) => `${key}=${value}`).join("; ");
          const captureCookies = (response) => {
            for (const cookie of response.headers.getSetCookie?.() || []) {
              const pair = String(cookie).split(";", 1)[0];
              const separator = pair.indexOf("=");
              if (separator > 0) {
                cookieJar.set(pair.slice(0, separator).trim(), pair.slice(separator + 1).trim());
              }
            }
          };
          const request = async (path, options = {}) => {
            const headers = new Headers(options.headers);
            if (cookieJar.size) headers.set("cookie", cookieHeader());
            if (!headers.has("cache-control")) headers.set("cache-control", "no-cache");
            if (!headers.has("pragma")) headers.set("pragma", "no-cache");
            const response = await fetch(new URL(path, baseUrl), { ...options, headers, redirect: "manual" });
            captureCookies(response);
            return response;
          };
          const follow = async (path, options = {}, maxRedirects = 10) => {
            let target = new URL(path, baseUrl);
            let requestOptions = { ...options };
            for (let attempt = 0; attempt <= maxRedirects; attempt += 1) {
              const response = await request(target, requestOptions);
              if (response.status < 300 || response.status >= 400) return { response, redirectedToLogin: false };
              const location = response.headers.get("location");
              if (!location) return { response, redirectedToLogin: false };
              target = new URL(location, target);
              if (target.pathname === "/login") return { response, redirectedToLogin: true };
              const method = (requestOptions.method || "GET").toUpperCase();
              if (response.status === 303 || (response.status === 302 && method !== "GET" && method !== "HEAD")) {
                requestOptions = { ...requestOptions, method: "GET", body: undefined };
              }
            }
            return { response: null, redirectedToLogin: true };
          };
          const ensureNoMissingConfig = async (response) => {
            let missingConfig = false;
            if (response.body?.getReader) {
              const decoder = new TextDecoder();
              const reader = response.body.getReader();
              while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                if (value && decoder.decode(value, { stream: true }).toLowerCase().includes("configuration not found")) {
                  missingConfig = true;
                }
              }
            } else {
              const text = await response.text().catch(() => "");
              if (text.toLowerCase().includes("configuration not found")) missingConfig = true;
            }
            if (missingConfig) throw new Error("Unraid container configuration not found");
          };

          try {
            await request("/login");
            const login = await follow("/login", {
              method: "POST",
              headers: { "content-type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({ username, password }),
            });
            if (login.redirectedToLogin) throw new Error("Unraid login failed");

            const dockerPage = await follow(`/Docker?_=${Date.now()}`);
            if (dockerPage.redirectedToLogin || dockerPage.response?.status >= 400) {
              throw new Error("Unraid Docker page is unavailable");
            }
            dockerPage.response?.body?.cancel?.();

            const updateUrl = new URL("/plugins/dynamix.docker.manager/include/CreateDocker.php", baseUrl);
            updateUrl.searchParams.set("updateContainer", "true");
            for (const container of containers) updateUrl.searchParams.append("ct[]", container);

            const abortController = new AbortController();
            const timeoutId = setTimeout(() => abortController.abort(), 10 * 60 * 1000);
            try {
              const response = await request(updateUrl, { signal: abortController.signal });
              clearTimeout(timeoutId);
              if (response.status >= 300 && response.status < 400) {
                const location = response.headers.get("location") || "";
                if (new URL(location, updateUrl).pathname === "/login") throw new Error("Unraid session expired");
              }
              if (response.status >= 400) throw new Error(`Unraid update failed with status ${response.status}`);
              await ensureNoMissingConfig(response);
            } finally {
              clearTimeout(timeoutId);
            }
          } catch (error) {
            console.error(error instanceof Error ? error.message : error);
            process.exit(1);
          }
          NODE
